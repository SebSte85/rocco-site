<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rocco</title>
  <meta name="description" content="Rocco — door bouncer for your phone." />
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@700;800&family=Figtree:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --night:#10161F; --bone:#F5F2EB; --amber:#D9A441; --slate:#9AA3AD; --line:rgba(245,242,235,0.12); }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--night); color: var(--bone);
      font-family: Figtree, system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
    }
    h1 {
      font-family: Gabarito, sans-serif; font-weight: 800; font-size: clamp(36px, 8vw, 52px);
      letter-spacing: -1px; margin: 0 0 12px;
    }
    .tag { color: var(--slate); margin: 0 0 28px; max-width: 360px; line-height: 1.5; }
    .links {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px;
    }
    .links a {
      display: inline-block; padding: 12px 16px; border: 2px solid #1D1D1D; border-radius: 14px;
      background: var(--amber); color: var(--night); font-family: Gabarito, sans-serif;
      font-weight: 700; font-size: 14px; text-decoration: none;
    }
    .links a.ghost {
      background: transparent; color: var(--bone);
    }
    .foot {
      position: absolute; bottom: 24px; left: 0; right: 0;
      color: var(--slate); font-size: 12px;
    }
    .foot a { color: var(--slate); margin: 0 8px; }
    @media (max-height: 520px) {
      .foot { position: static; margin-top: 32px; }
    }
  </style>
</head>
<body>
  <div>
    <h1>Rocco</h1>
    <p class="tag">Door bouncer for your phone. Blocks the apps you choose — nothing else.</p>
    <div class="links">
      <a href="privacy/">Privacy</a>
      <a class="ghost" href="privacy/de/">Datenschutz</a>
      <a href="terms/">Terms</a>
      <a class="ghost" href="terms/de/">Nutzungsbedingungen</a>
    </div>
  </div>
  <p class="foot">
    <a href="impressum/">Impressum</a>
    · DigITup GmbH
  </p>
</body>
</html>
